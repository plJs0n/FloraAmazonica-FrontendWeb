<div class="overlay" (click)="onOverlayClick($event)">
  <div class="modal">
    <div class="modal-header">
      <div class="titulo-grupo">
        <div class="icono-lock">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
          </svg>
        </div>
        <h3>Cambiar contraseña</h3>
      </div>
      <button class="btn-cerrar" (click)="cerrar.emit()" aria-label="Cerrar">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
    </div>

    <div class="modal-body">
      <!-- Contraseña actual -->
      <div class="campo-grupo">
        <label for="actual">Contraseña actual</label>
        <div class="input-pass">
          <input
            id="actual"
            [type]="mostrarActual() ? 'text' : 'password'"
            [ngModel]="contrasenaActual()"
            (ngModelChange)="contrasenaActual.set($event)"
            placeholder="Ingresa tu contraseña actual"
            autocomplete="current-password"
          />
          <button class="toggle-pass" type="button" (click)="mostrarActual.set(!mostrarActual())" tabindex="-1">
            @if (mostrarActual()) {
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" />
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" />
                <line x1="1" y1="1" x2="23" y2="23" />
              </svg>
            } @else {
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            }
          </button>
        </div>
      </div>

      <div class="divisor"></div>

      <!-- Nueva contraseña -->
      <div class="campo-grupo">
        <label for="nueva">Nueva contraseña</label>
        <div class="input-pass">
          <input
            id="nueva"
            [type]="mostrarNueva() ? 'text' : 'password'"
            [ngModel]="nuevaContrasena()"
            (ngModelChange)="nuevaContrasena.set($event)"
            placeholder="Mínimo 8 caracteres"
            autocomplete="new-password"
          />
          <button class="toggle-pass" type="button" (click)="mostrarNueva.set(!mostrarNueva())" tabindex="-1">
            @if (mostrarNueva()) {
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" />
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" />
                <line x1="1" y1="1" x2="23" y2="23" />
              </svg>
            } @else {
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            }
          </button>
        </div>
      </div>

      <!-- Confirmar nueva -->
      <div class="campo-grupo">
        <label for="confirmar">Confirmar nueva contraseña</label>
        <div class="input-pass">
          <input
            id="confirmar"
            [type]="mostrarConfirmar() ? 'text' : 'password'"
            [ngModel]="confirmarContrasena()"
            (ngModelChange)="confirmarContrasena.set($event)"
            placeholder="Repite la nueva contraseña"
            autocomplete="new-password"
          />
          <button class="toggle-pass" type="button" (click)="mostrarConfirmar.set(!mostrarConfirmar())" tabindex="-1">
            @if (mostrarConfirmar()) {
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" />
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" />
                <line x1="1" y1="1" x2="23" y2="23" />
              </svg>
            } @else {
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            }
          </button>
        </div>
      </div>

      @if (error()) {
        <div class="error-banner">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="8" x2="12" y2="12" />
            <line x1="12" y1="16" x2="12.01" y2="16" />
          </svg>
          {{ error() }}
        </div>
      }
    </div>

    <div class="modal-footer">
      <button class="btn-cancelar" (click)="cerrar.emit()" [disabled]="cargando()">Cancelar</button>
      <button class="btn-guardar" (click)="onGuardar()" [disabled]="cargando()">
        @if (cargando()) {
          <span class="spinner"></span> Guardando...
        } @else {
          Guardar contraseña
        }
      </button>
    </div>
  </div>
</div>
